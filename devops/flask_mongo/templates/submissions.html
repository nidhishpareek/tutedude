<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Submissions</title>
</head>
<body>
  <h1>Submitted Names and Emails</h1>

  {% if error %}
    <p style="color: red;">{{ error }}</p>
  {% elif records %}
    <table border="1" cellpadding="8" cellspacing="0">
      <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
        </tr>
      </thead>
      <tbody>
        {% for record in records %}
          <tr>
            <td>{{ record.name }}</td>
            <td>{{ record.email }}</td>
          </tr>
        {% endfor %}
      </tbody>
    </table>
  {% else %}
    <p>No submissions found.</p>
  {% endif %}
</body>
</html>
